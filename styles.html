<style>
  :root {
    --bg-left: #4d82bf;
    --bg-right: #d7f0df;
    --panel-bg: rgba(255, 255, 255, 0.84);
    --panel-border: rgba(255, 255, 255, 0.50);
    --shadow: 0 10px 22px rgba(18, 41, 74, 0.16);
    --title: #121212;
  }

  * { box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, var(--bg-left) 5%, #7eb0da 45%, var(--bg-right) 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.22), transparent 28%),
      radial-gradient(circle at 85% 18%, rgba(255,255,255,0.18), transparent 20%),
      radial-gradient(circle at 75% 85%, rgba(255,255,255,0.16), transparent 26%);
    pointer-events: none;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    padding: 18px;
    display: grid;
    grid-template-rows: 17% 83%;
    gap: 14px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header h1 {
    margin: 0;
    color: var(--title);
    font-size: clamp(42px, 4vw, 62px);
    font-weight: 900;
    text-transform: uppercase;
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
  }

  .grid {
    display: grid;
    grid-template-columns: 1.22fr 1fr 1fr;
    gap: 16px;
    min-height: 0;
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 0;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .panel-inner {
    height: 100%;
    padding: 18px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 14px;
    min-height: 0;
  }

  .panel-title {
    margin: 0;
    color: #1b1b1b;
    font-size: clamp(21px, 1.35vw, 25px);
    line-height: 1.02;
    font-weight: 900;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: -0.2px;
  }

  .promo-shell {
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
    min-height: 0;
  }

  .carousel {
    position: relative;
    min-height: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
    border-radius: 22px;
    padding: 14px 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.42);
    display: grid;
    align-items: center;
  }

  .carousel-track {
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-items: stretch;
  }

  .promo-card {
    background: rgba(255,255,255,0.94);
    border-radius: 18px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.11);
    overflow: hidden;
    display: grid;
    grid-template-rows: 60% 40%;
    min-height: 0;
  }

  .promo-media {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background: linear-gradient(180deg, #fee9a9, #f7f0c7);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .promo-media.blue {
    background: linear-gradient(180deg, #d8eefc, #c3e0fb);
  }

  .product-illustration {
    width: 78%;
    height: 82%;
    position: relative;
    display: grid;
    place-items: center;
  }

  .promo-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .promo-placeholder {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 12px;
    color: #184a6d;
    font-weight: 800;
    background: rgba(255,255,255,0.7);
    border: 2px dashed rgba(24,74,109,0.22);
  }

  .promo-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 10px 12px;
    text-align: center;
    color: #171717;
  }

  .promo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 20px;
    padding: 2px 10px;
    border-radius: 999px;
    background: rgba(79, 143, 202, 0.12);
    color: #22577e;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .promo-name {
    font-size: clamp(15px, 0.98vw, 18px);
    font-weight: 900;
    line-height: 1.0;
    text-transform: uppercase;
  }

  .promo-price {
    font-size: clamp(15px, 1.05vw, 19px);
    font-weight: 800;
  }

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.96);
    color: #1b1b1b;
    font-size: 25px;
    font-weight: 700;
    box-shadow: 0 6px 12px rgba(0,0,0,0.11);
    display: grid;
    place-items: center;
  }

  .nav-btn.left { left: -7px; }
  .nav-btn.right { right: -7px; }

  .dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding-bottom: 0;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.76);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }

  .dot.active { background: #f5f5f5; }

  .queue-shell {
    height: 100%;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 12px;
    min-height: 0;
  }

  .queue-header {
    background: rgba(188, 214, 238, 0.92);
    border-radius: 12px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    font-size: clamp(14px, 1vw, 18px);
    font-weight: 800;
    color: #273142;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.40);
  }

  .queue-list {
    display: grid;
    gap: 4px;
    align-content: start;
    min-height: 0;
  }

  .queue-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    align-items: center;
    padding: 10px 6px 10px 4px;
    border-bottom: 1px solid rgba(25, 37, 57, 0.11);
    color: #121212;
    font-size: clamp(16px, 1.1vw, 20px);
    font-weight: 700;
  }

  .queue-no { font-size: 1.05em; font-weight: 800; }

  .queue-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 900;
    justify-self: start;
  }

  .queue-ico {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: inline-grid;
    place-items: center;
    font-size: 16px;
    font-weight: 900;
    color: #fff;
  }

  .ready .queue-status { color: #1c8b3a; }
  .ready .queue-ico { background: #1c8b3a; }
  .processing .queue-status { color: #1f2937; }
  .processing .queue-ico { background: #d4a11f; }
  .waiting .queue-status { color: #6b4f00; }
  .waiting .queue-ico { background: #efc94c; }

  .services-shell {
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 12px;
    min-height: 0;
  }

  .service-list {
    display: grid;
    gap: 10px;
    align-content: start;
    min-height: 0;
  }

  .service-card {
    display: grid;
    grid-template-columns: 80px 1fr;
    align-items: center;
    gap: 8px;
    background: rgba(212, 245, 230, 0.95);
    border-radius: 16px;
    padding: 12px 14px;
    min-height: 112px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.52);
  }

  .service-icon {
    width: 72px;
    height: 72px;
    display: grid;
    place-items: center;
    font-size: 52px;
    line-height: 1;
  }

  .service-label {
    color: #1a1a1a;
    font-size: clamp(17px, 1.05vw, 20px);
    font-weight: 900;
    line-height: 1.0;
  }

  @media (max-width: 1200px) {
    .grid { grid-template-columns: 1fr; grid-auto-rows: minmax(280px, auto); overflow: auto; }
    html, body { overflow: auto; }
    .screen { height: auto; min-height: 100vh; }
  }
</style>
